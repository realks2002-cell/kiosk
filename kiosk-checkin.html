<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>키오스크 — 등원 체크인</title>
<link rel="stylesheet" href="kiosk.css">
<style>
  .body{flex:1;display:flex;flex-direction:column;padding:28px 32px;}
  .head2{display:flex;align-items:center;margin-bottom:8px;}
  .lead{font-size:16px;color:var(--muted-fg);margin:0 0 22px 0;}
  .cols{flex:1;display:grid;grid-template-columns:1fr 64px 1fr;gap:0;align-items:stretch;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);
    padding:30px;display:flex;flex-direction:column;align-items:center;}
  .panel h2{font-size:23px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px;}
  .panel .desc{font-size:15px;color:var(--muted-fg);margin-bottom:24px;}

  /* QR scan viewfinder */
  .scan{position:relative;width:300px;height:300px;border-radius:20px;
    background:radial-gradient(circle at 50% 40%,#173a35,#0d3d38);display:flex;
    align-items:center;justify-content:center;color:#7fd8cb;}
  .scan .frame{position:absolute;inset:34px;border-radius:14px;}
  .scan .frame i{position:absolute;width:38px;height:38px;border:4px solid var(--primary);}
  .corner-tl{top:0;left:0;border-right:none!important;border-bottom:none!important;border-radius:14px 0 0 0;}
  .corner-tr{top:0;right:0;border-left:none!important;border-bottom:none!important;border-radius:0 14px 0 0;}
  .corner-bl{bottom:0;left:0;border-right:none!important;border-top:none!important;border-radius:0 0 0 14px;}
  .corner-br{bottom:0;right:0;border-left:none!important;border-top:none!important;border-radius:0 0 14px 0;}
  .scan .laser{position:absolute;left:34px;right:34px;top:50%;height:3px;background:var(--primary);
    box-shadow:0 0 12px 2px var(--primary);opacity:.9;}
  .scanhint{margin-top:22px;font-size:17px;font-weight:600;color:var(--ink);text-align:center;}
  .scanhint span{display:block;font-size:14px;font-weight:500;color:var(--muted-fg);margin-top:4px;}

  /* divider */
  .or{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
  .or .line{width:1px;flex:1;background:var(--line);}
  .or b{font-size:14px;color:var(--muted-fg);background:var(--background);padding:8px 0;font-weight:600;}

  /* PIN */
  .pinview{display:flex;gap:16px;margin-bottom:26px;}
  .pinview i{width:20px;height:20px;border-radius:50%;background:var(--line);}
  .pinview i.on{background:var(--primary);}
  .numpad{display:grid;grid-template-columns:repeat(3,96px);gap:12px;}
  .key{height:78px;border:1.5px solid var(--line);background:#fff;border-radius:var(--r-md);
    font:inherit;font-size:28px;font-weight:600;color:var(--ink);cursor:pointer;transition:.12s;}
  .key:hover{background:var(--primary-soft);border-color:var(--primary);}
  .key:active{transform:scale(.96);}
  .key.del{font-size:20px;color:var(--muted-fg);}
  .key.ok{background:var(--primary);color:#fff;border-color:var(--primary);}
  .pinlabel{font-size:15px;color:var(--muted-fg);margin-bottom:14px;}
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="logo"><i data-lucide="graduation-cap" class="lucide"></i></div>
    <div class="brand">국풍국어학원<small>신갈관</small></div>
    <div class="spacer"></div>
    <div class="clock"><span>2026년 6월 21일 (일)</span><b>오후 4:20</b></div>
  </div>

  <div class="body">
    <div class="head2">
      <button class="back"><i data-lucide="chevron-left" class="lucide" style="width:20px;height:20px"></i>처음으로</button>
      <span class="title">등원 체크인</span>
    </div>
    <p class="lead">QR 코드를 비추거나, PIN 번호를 입력해 체크인하세요. 체크인 즉시 학부모님께 알림이 발송됩니다.</p>

    <div class="cols">
      <!-- QR -->
      <div class="panel">
        <h2><i data-lucide="qr-code" class="lucide" style="width:26px;height:26px;stroke:var(--primary)"></i>QR로 체크인</h2>
        <div class="desc">학생 앱의 QR 코드를 카메라에 비춰주세요</div>
        <div class="scan">
          <div class="frame">
            <i class="corner-tl"></i><i class="corner-tr"></i><i class="corner-bl"></i><i class="corner-br"></i>
          </div>
          <div class="laser"></div>
          <i data-lucide="scan-line" style="width:60px;height:60px;opacity:.4"></i>
        </div>
        <div class="scanhint">QR을 화면 안에 맞춰주세요
          <span>자동으로 인식됩니다</span>
        </div>
      </div>

      <!-- OR -->
      <div class="or"><div class="line"></div><b>또는</b><div class="line"></div></div>

      <!-- PIN -->
      <div class="panel">
        <h2><i data-lucide="lock-keyhole" class="lucide" style="width:24px;height:24px;stroke:var(--primary)"></i>PIN으로 체크인</h2>
        <div class="desc">개인 4자리 PIN 번호를 입력하세요</div>
        <div class="pinlabel">PIN 4자리</div>
        <div class="pinview"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
        <div class="numpad">
          <button class="key">1</button><button class="key">2</button><button class="key">3</button>
          <button class="key">4</button><button class="key">5</button><button class="key">6</button>
          <button class="key">7</button><button class="key">8</button><button class="key">9</button>
          <button class="key del"><i data-lucide="delete" style="width:24px;height:24px"></i></button>
          <button class="key">0</button>
          <button class="key ok"><i data-lucide="check" style="width:28px;height:28px"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
